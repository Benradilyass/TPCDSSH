name: CD Flask Docker

on:
  push:
    branches:
      - main

jobs:
  cd:
    name: Docker Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        run: |
          set -e
          docker build -t ${{ secrets.DOCKER_USERNAME }}/flask_devops_demo:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/flask_devops_demo:latest

      - name: Deploy via SSH
        run: |
          echo "${{ secrets.SSH_KEY }}" | tr -d '\r' > key.pem
          chmod 600 key.pem
          ssh -i key.pem -o StrictHostKeyChecking=no "${{ secrets.SSH_USER }}"@"${{ secrets.SSH_HOST }}" "powershell -ExecutionPolicy Bypass -File 'C:\\tests\\TPCDSSH\\deploy.ps1' -DockerUser '${{ secrets.DOCKER_USERNAME }}' -DockerToken '${{ secrets.DOCKER_TOKEN }}'"